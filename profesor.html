<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Panel del Profesor - En Vivo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0a0e27;color:#e0e0e0;padding:16px}
h1{font-size:22px;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,#38ef7d,#11998e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:#7a7fa8;font-size:13px;margin-bottom:16px}
.tabs{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.tab{padding:10px 20px;border:2px solid #1e2454;border-radius:10px;background:#12173a;color:#7a7fa8;cursor:pointer;font-weight:600;font-family:inherit}
.tab.active{border-color:#38ef7d;color:#38ef7d;background:#0d2818}
.stats{display:flex;gap:10px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.stat{background:#12173a;border-radius:10px;padding:12px 18px;text-align:center;min-width:90px}
.stat .num{font-size:24px;font-weight:700;color:#38ef7d}
.stat .lbl{font-size:11px;color:#7a7fa8}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1e2454;padding:10px 8px;text-align:left}
td{padding:10px 8px;border-bottom:1px solid #1e2454}
.badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.b-green{background:#1B5E20;color:#A5D6A7}
.b-red{background:#B71C1C;color:#FFCDD2}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.status-box{border-radius:10px;padding:12px;margin-bottom:16px;font-size:13px;text-align:center}
.status-ok{background:#0d2818;border:1px solid #38ef7d;color:#A5D6A7}
.status-err{background:#1a0a0a;border:1px solid #ff4b2b;color:#ff8a80}
</style>
</head>
<body>
<img src="logo.png" alt="IAT" style="width:70px;display:block;margin:0 auto 8px;filter:drop-shadow(0 0 10px rgba(0,150,255,.4))" onerror="this.style.display='none'">
<h1>📊 Panel del Profesor</h1>
<p class="sub">Prof. Gutiérrez — En vivo, se actualiza solo</p>

<div id="status" class="status-box status-err">Conectando con la nube...</div>

<div class="tabs">
  <div id="tab-e1" class="tab active" onclick="cambiar('E1')">Electrónica 1</div>
  <div id="tab-e2" class="tab" onclick="cambiar('E2')">Electrónica 2</div>
</div>

<div style="text-align:center;margin-bottom:16px">
  <button onclick="resetearMateria()" style="padding:10px 18px;background:#c62828;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin:4px">🗑️ Borrar datos de esta materia</button>
  <button onclick="resetearTodo()" style="padding:10px 18px;background:#7b1fa2;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin:4px">🗑️ Borrar TODO (E1 y E2)</button>
</div>

<div class="stats">
  <div class="stat"><div class="num" id="s-total">0</div><div class="lbl">Conectados</div></div>
  <div class="stat"><div class="num" id="s-done">0</div><div class="lbl">Terminaron</div></div>
  <div class="stat"><div class="num" id="s-avg">-</div><div class="lbl">Promedio</div></div>
  <div class="stat"><div class="num" id="s-warns">0</div><div class="lbl">Salidas app</div></div>
</div>

<div style="overflow-x:auto">
<table>
  <thead><tr><th>Estado</th><th>Alumno</th><th>Progreso</th><th>Nota</th><th>Tiempo</th><th>Salidas</th><th>Última act.</th></tr></thead>
  <tbody id="tabla"></tbody>
</table>
</div>
<p id="vacio" style="text-align:center;color:#555;margin-top:30px">Esperando que los alumnos se conecten...</p>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script src="config.js"></script>
<script>
let db=null, materiaActual="E1", datos={E1:{},E2:{}};
const statusEl = document.getElementById("status");

function arrancar(){
  try{
    if(typeof firebaseConfig === "undefined"){
      statusEl.className="status-box status-err";
      statusEl.textContent="❌ No se encontró config.js. Verificá que esté subido.";
      return;
    }
    if(firebaseConfig.apiKey === "PEGAR_AQUI" || !firebaseConfig.apiKey){
      statusEl.className="status-box status-err";
      statusEl.textContent="❌ Firebase sin configurar en config.js";
      return;
    }
    firebase.initializeApp(firebaseConfig);
    db=firebase.database();
    statusEl.className="status-box status-ok";
    statusEl.textContent="✅ Conectado a la nube. Todo se actualiza en vivo.";
    escuchar("E1"); escuchar("E2");
  }catch(e){
    statusEl.className="status-box status-err";
    statusEl.textContent="❌ Error al conectar: "+e.message;
  }
}

function escuchar(mat){
  db.ref("resultados/"+mat).on("value", snap=>{
    datos[mat] = snap.val() || {};
    if(mat===materiaActual) render();
  }, err=>{
    statusEl.className="status-box status-err";
    statusEl.textContent="❌ Error de permisos en Firebase. Revisá las reglas (modo prueba).";
  });
}

function cambiar(mat){
  materiaActual = mat;
  document.getElementById("tab-e1").classList.toggle("active", mat==="E1");
  document.getElementById("tab-e2").classList.toggle("active", mat==="E2");
  render();
}

function render(){
  const d = datos[materiaActual];
  const arr = Object.values(d);
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";
  document.getElementById("vacio").style.display = arr.length===0 ? "block" : "none";

  let terminados=0, sumaNotas=0, totalSalidas=0;
  arr.sort((a,b)=>(b.ultimaActividad||"").localeCompare(a.ultimaActividad||""));

  arr.forEach(r=>{
    if(r.terminado){terminados++; sumaNotas+=r.notaParcial||0;}
    totalSalidas += r.salidas||0;
    const tr = document.createElement("tr");
    let estadoBadge = r.terminado
      ? '<span class="badge b-green">✓ Terminó</span>'
      : '<span><span class="dot" style="background:#38ef7d"></span><span style="color:#38ef7d">En curso</span></span>';
    if(r.evento==="salio_app" && !r.terminado)
      estadoBadge = '<span><span class="dot" style="background:#ff4b2b"></span><span style="color:#ff4b2b">⚠ Salió</span></span>';
    const notaBadge = r.terminado
      ? `<span class="badge ${r.notaParcial>=6?'b-green':'b-red'}">${r.notaParcial}/10</span>`
      : `<span style="color:#555">${r.notaParcial||0}/10</span>`;
    const min = Math.floor((r.tiempoUsado||0)/60), seg=(r.tiempoUsado||0)%60;
    tr.innerHTML = `
      <td>${estadoBadge}</td>
      <td style="font-weight:600">${r.nombre}</td>
      <td>${r.respondidas||0}/${r.totalPreguntas||15}</td>
      <td>${notaBadge}</td>
      <td>${min}:${String(seg).padStart(2,'0')}</td>
      <td><span class="${(r.salidas||0)>0?'badge b-red':''}">${r.salidas||0}</span></td>
      <td style="font-size:11px;color:#7a7fa8">${r.ultimaActividad||"-"}</td>`;
    tabla.appendChild(tr);
  });

  document.getElementById("s-total").textContent = arr.length;
  document.getElementById("s-done").textContent = terminados;
  document.getElementById("s-avg").textContent = terminados>0 ? (sumaNotas/terminados).toFixed(1) : "-";
  document.getElementById("s-warns").textContent = totalSalidas;
}


function resetearMateria(){
  if(!db){alert("No conectado a la nube todavía.");return;}
  const mat = materiaActual;
  if(confirm("¿Seguro que querés borrar TODOS los datos de "+(mat==="E1"?"Electrónica 1":"Electrónica 2")+"?\n\nEsto no se puede deshacer.")){
    db.ref("resultados/"+mat).remove().then(()=>{
      alert("✅ Datos de "+mat+" borrados.");
    }).catch(e=>alert("Error al borrar: "+e.message));
  }
}

function resetearTodo(){
  if(!db){alert("No conectado a la nube todavía.");return;}
  if(confirm("¿Seguro que querés borrar TODO (Electrónica 1 Y Electrónica 2)?\n\nEsto no se puede deshacer.")){
    db.ref("resultados").remove().then(()=>{
      alert("✅ Todos los datos borrados (E1 y E2).");
    }).catch(e=>alert("Error al borrar: "+e.message));
  }
}

if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",arrancar);
else arrancar();
</script>
</body>
</html>
